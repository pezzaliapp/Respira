<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="#1a1209"/>

  <!-- Warm orb glow -->
  <radialGradient id="orb1" cx="38%" cy="32%" r="65%">
    <stop offset="0%" stop-color="#c4845a" stop-opacity="0.45"/>
    <stop offset="100%" stop-color="#1a1209" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#orb1)"/>

  <!-- Cool accent glow -->
  <radialGradient id="orb2" cx="75%" cy="72%" r="50%">
    <stop offset="0%" stop-color="#7a9e7e" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#1a1209" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" fill="url(#orb2)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#c4845a" stroke-width="5" stroke-opacity="0.35"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="162" fill="none" stroke="#f5ede0" stroke-width="2" stroke-opacity="0.12"/>

  <!-- Breath leaf — the core mark -->
  <!-- Ascending left arc -->
  <path
    d="M256 148
       C 300 178, 326 220, 320 268
       C 314 316, 288 348, 256 364"
    fill="none"
    stroke="#f5ede0"
    stroke-width="11"
    stroke-linecap="round"
    stroke-opacity="0.92"
  />
  <!-- Descending right arc -->
  <path
    d="M256 148
       C 212 178, 186 220, 192 268
       C 198 316, 224 348, 256 364"
    fill="none"
    stroke="#f5ede0"
    stroke-width="11"
    stroke-linecap="round"
    stroke-opacity="0.92"
  />

  <!-- Vertical spine (breath axis) -->
  <line x1="256" y1="148" x2="256" y2="364"
        stroke="#c4845a" stroke-width="4" stroke-opacity="0.6"
        stroke-dasharray="6 10" stroke-linecap="round"/>

  <!-- Center pulse dot -->
  <circle cx="256" cy="256" r="10" fill="#c4845a" fill-opacity="0.95"/>
  <circle cx="256" cy="256" r="18" fill="none" stroke="#c4845a" stroke-width="2" stroke-opacity="0.4"/>
</svg>
